services:
  nginx-lb-master:
    build:
      context: ./docker/nginx-keepalived
      dockerfile: Dockerfile
    container_name: nginx-lb-master
    hostname: nginx-lb-master
    volumes:
      - ./configs/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - shared-webapp:/data/webshare:ro
    networks:
      ha-network:
        ipv4_address: 172.28.0.11
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - storage-init
      - webapp1
      - webapp2
    restart: unless-stopped

  nginx-lb-backup:
    build:
      context: ./docker/nginx-keepalived
      dockerfile: Dockerfile
    container_name: nginx-lb-backup
    hostname: nginx-lb-backup
    volumes:
      - ./configs/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - shared-webapp:/data/webshare:ro
    networks:
      ha-network:
        ipv4_address: 172.28.0.12
    ports:
      - "8080:80"
    depends_on:
      - storage-init
      - webapp1
      - webapp2
    restart: unless-stopped

  webapp1:
    image: nginx:alpine
    container_name: webapp1
    hostname: webapp1
    volumes:
      - shared-webapp:/usr/share/nginx/html:ro
      - ./configs/nginx/webapp-nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      ha-network:
        ipv4_address: 172.28.0.21
    depends_on:
      - storage-init
    restart: unless-stopped

  webapp2:
    image: nginx:alpine
    container_name: webapp2
    hostname: webapp2
    volumes:
      - shared-webapp:/usr/share/nginx/html:ro
      - ./configs/nginx/webapp-nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      ha-network:
        ipv4_address: 172.28.0.22
    depends_on:
      - storage-init
    restart: unless-stopped

  storage-init:
    image: alpine:latest
    container_name: storage-init
    volumes:
      - shared-webapp:/data
      - ./webapp:/src:ro
    command: sh -c "cp -r /src/* /data/ 2>/dev/null || true && echo 'Shared storage initialized'"
    networks:
      ha-network:
        ipv4_address: 172.28.0.40

  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    hostname: filebrowser
    volumes:
      - shared-webapp:/srv
    networks:
      ha-network:
        ipv4_address: 172.28.0.41
    ports:
      - "8082:80"
    environment:
      - FB_NOAUTH=true
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    hostname: prometheus
    volumes:
      - ./configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      ha-network:
        ipv4_address: 172.28.0.30
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.0.0
    container_name: grafana
    hostname: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin123}
      - GF_INSTALL_PLUGINS=
    volumes:
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    networks:
      ha-network:
        ipv4_address: 172.28.0.31
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    hostname: node-exporter
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      ha-network:
        ipv4_address: 172.28.0.32
    ports:
      - "9100:9100"
    restart: unless-stopped

networks:
  ha-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  prometheus-data:
  grafana-data:
  shared-webapp:
